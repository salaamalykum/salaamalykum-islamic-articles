---
layout: default
---
<article class="article-container">
    <header class="article-header">
        <div class="article-meta-tags">
            {% for tag in page.tags %}
                <span class="badge">{{ tag }}</span>
            {% endfor %}
        </div>
        <h1 class="article-title">{{ page.title }}</h1>
        <div class="article-meta">
            <div class="meta-item">
                <span class="meta-icon">👤</span>
                <span class="meta-text">{{ page.author | default: "Hasan09" }}</span>
            </div>
            <div class="meta-item">
                <span class="meta-icon">📅</span>
                <span class="meta-text">{{ page.pub_date | date: "%B %d, %Y" }}</span>
            </div>
            <div class="meta-item">
                <a href="{{ page.source }}" target="_blank" rel="noopener" class="source-link">
                    <span class="meta-icon">🔗</span>
                    View Original
                </a>
            </div>
        </div>
    </header>

    <div class="article-body markdown-content">
        {{ content }}
    </div>
    
    <footer class="article-footer">
        <div class="footer-hash">
            <span class="hash-label">Content Hash:</span>
            <code class="hash-value">{{ page.content_hash }}</code>
        </div>
    </footer>
</article>
