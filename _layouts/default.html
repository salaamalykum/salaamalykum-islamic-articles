<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{{ page.title | default: site.title }}</title>
    <meta name="description" content="{{ page.description | default: site.description }}">
    
    <!-- Google Fonts: Inter for stunning modern typography -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    
    <link rel="stylesheet" href="{{ '/assets/css/main.css' | relative_url }}">
</head>
<body>
    <div class="app-container">
        <!-- Premium Glassmorphism Navbar -->
        <header class="navbar">
            <div class="nav-content">
                <a href="{{ '/' | relative_url }}" class="logo">
                    <span class="logo-icon">✨</span>
                    Salaamalykum Knowledge
                </a>
                <nav class="nav-links">
                    <a href="{{ '/' | relative_url }}">Home</a>
                    <a href="https://huggingface.co/datasets/qurancn/islamic-articles-corpus" target="_blank" rel="noopener noreferrer">HF Dataset</a>
                    <a href="https://salaamalykum.com" target="_blank" rel="noopener noreferrer">Main Site</a>
                </nav>
            </div>
        </header>

        <main class="main-content">
            {{ content }}
        </main>

        <footer class="footer">
            <div class="footer-content">
                <p>&copy; 2026 Salaamalykum. Dual-track Knowledge Base.</p>
                <p class="footer-sub">Optimized for Humans & AI crawlers.</p>
            </div>
        </footer>
    </div>
</body>
</html>
